<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error - GB Delight</title>
    <link
      href="{{ url_for('static', filename='tailwind.css') }}"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-gradient-to-br from-red-50 to-red-100 min-h-screen flex items-center justify-center p-4"
  >
    <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8 text-center">
      <div class="mb-4 flex justify-center">
        <span
          class="material-symbols-outlined text-red-600"
          style="font-size: 64px"
          >error</span
        >
      </div>
      <h1 class="text-2xl font-bold text-red-600 mb-2">
        Oops! Something went wrong
      </h1>
      <p class="text-gray-600 mb-6">{{ error }}</p>
      <a
        href="{{ url_for('index') }}"
        class="inline-block bg-primary text-white px-6 py-3 rounded-full font-semibold hover:opacity-90 transition-opacity"
      >
        Back to Home
      </a>
    </div>
  </body>
</html>
