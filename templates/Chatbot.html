<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CakeBot AI - GB Delight Cake Assistant</title>
    <link
      href="{{ url_for('static', filename='tailwind.css') }}"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='fonts/plus-jakarta-sans/plus_jakarta_sans.css') }}"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='fonts/material-symbols/material_symbols_outlined.css') }}"
      rel="stylesheet"
    />
    <!-- Tailwind is compiled locally into static/tailwind.css for offline use -->
  </head>
  <body class="flex h-screen overflow-hidden text-on-background">
    <!-- Sidebar Container (Mapped from SideNavBar logic) -->
    <aside
      class="flex flex-col h-full fixed left-0 top-0 py-8 px-4 z-40 bg-stone-50 dark:bg-stone-900 h-screen w-72 border-r border-pink-100/50 dark:border-stone-800 font-['Plus_Jakarta_Sans'] text-sm tracking-wide"
    >
      <!-- User Profile -->
      <div class="flex items-center gap-4 mb-lg px-2">
        <div class="relative">
          <div
            class="w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center border-2 border-primary-container shadow-sm font-bold text-lg"
          >
            {{ user_name[0].upper() if user_name else 'U' }}
          </div>
          <span
            class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 border-2 border-stone-50 rounded-full"
          ></span>
        </div>
        <div>
          <h3 class="font-bold text-on-surface">{{ user_name }}</h3>
          <p class="text-caption text-stone-500">Baker</p>
        </div>
      </div>
      <!-- Chat History -->
      <div class="flex-1 overflow-y-auto chat-scroll space-y-1">
        <div class="px-3 mb-4">
          <span
            class="text-[10px] font-bold uppercase tracking-widest text-stone-400"
            >Chat History</span
          >
        </div>
        <div id="chatHistoryList" class="space-y-1">
          <!-- Chat sessions will be loaded here by JavaScript -->
        </div>
      </div>
      <!-- Sidebar Footer -->
      <div class="mt-auto space-y-2 pt-6 border-t border-pink-100/50">
        <button
          id="newChatBtn"
          class="flex items-center gap-3 bg-primary text-white font-bold rounded-xl px-4 py-3 w-full justify-center shadow-lg active:scale-[0.98] transition-all hover:shadow-xl"
        >
          <span class="material-symbols-outlined text-[20px]" data-icon="add"
            >add</span
          >
          <span>New Chat</span>
        </button>
        <!-- <button
          class="flex items-center gap-3 text-stone-600 dark:text-stone-400 px-4 py-3 hover:bg-white rounded-xl w-full"
        >
          <!-- <span
            class="material-symbols-outlined text-[20px]"
            data-icon="settings"
            >settings</span
        
          <span>Settings</span>
        </button> -->
        <form action="{{ url_for('logout') }}" method="POST" class="w-full">
          <button
            class="flex items-center gap-3 text-stone-600 dark:text-stone-400 px-4 py-3 hover:bg-white rounded-xl w-full"
            type="submit"
          >
            <span
              class="material-symbols-outlined text-[20px]"
              data-icon="logout"
              >logout</span
            >
            <span>Log Out</span>
          </button>
        </form>
      </div>
    </aside>
    <!-- Main Chat Content -->
    <main class="flex-1 flex flex-col ml-72 h-full bg-background relative">
      <!-- Header (Mapped from TopNavBar) -->
      <header
        class="flex justify-between items-center w-full px-6 py-4 sticky top-0 z-50 bg-white/90 dark:bg-stone-950/90 backdrop-blur-md border-b border-pink-100 dark:border-pink-900/30 shadow-[0_4px_12px_rgba(233,30,99,0.06)]"
      >
        <div class="flex items-center gap-3">
          <div class="bg-primary-container p-2 rounded-xl text-white">
            <span class="material-symbols-outlined" data-icon="cake">cake</span>
          </div>
          <div>
            <h1
              class="text-lg font-black text-pink-600 dark:text-pink-500 tracking-tight"
            >
              AI Cake Assistant
            </h1>
            <p class="text-[10px] text-primary flex items-center gap-1">
              <span
                class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"
              ></span>
              Always ready to bake
            </p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <!-- <button
            class="p-2 text-stone-500 hover:text-primary transition-colors"
          >
            <span class="material-symbols-outlined" data-icon="notifications"
              >notifications</span
            >
          </button> -->
        </div>
      </header>
      <!-- Welcome Screen (shown when chat is empty) -->
      <div
        id="welcomeScreen"
        class="flex-1 overflow-y-auto p-md flex flex-col items-center justify-center"
      >
        <div class="text-center max-w-xl mx-auto">
          <div class="mb-8">
            <div
              class="w-24 h-24 mx-auto bg-primary-container rounded-3xl flex items-center justify-center mb-6"
            >
              <span
                class="material-symbols-outlined text-primary text-6xl"
                data-icon="cake"
                >cake</span
              >
            </div>
            <h2 class="text-headline-lg text-on-surface mb-2">
              Welcome to GB Delight
            </h2>
            <p class="text-body-md text-on-surface-variant mb-8">
              Your AI Cake Assistant is here to help you find the perfect cake,
              get recipes, and answer all your baking questions.
            </p>
          </div>

          <!-- Quick Start Buttons -->
          <div class="space-y-3 w-full">
            <button
              class="w-full flex items-center justify-between bg-white border border-pink-200 hover:border-primary hover:shadow-md p-4 rounded-2xl transition-all text-left group"
              onclick="
                handleQuickPrompt(
                  'Recommend a delicious cake for a birthday party',
                )
              "
            >
              <div class="flex items-center gap-3">
                <div class="bg-secondary-fixed p-3 rounded-xl">
                  <span class="material-symbols-outlined text-primary"
                    >star</span
                  >
                </div>
                <div>
                  <h4 class="font-bold text-on-surface">Recommend a Cake</h4>
                  <p class="text-sm text-on-surface-variant">
                    Get personalized cake suggestions
                  </p>
                </div>
              </div>
              <span
                class="material-symbols-outlined text-stone-400 group-hover:text-primary"
                >arrow_forward</span
              >
            </button>

            <button
              class="w-full flex items-center justify-between bg-white border border-pink-200 hover:border-primary hover:shadow-md p-4 rounded-2xl transition-all text-left group"
              onclick="
                handleQuickPrompt(
                  'Can you help me fix my cake recipe? It came out too dry',
                )
              "
            >
              <div class="flex items-center gap-3">
                <div class="bg-secondary-fixed p-3 rounded-xl">
                  <span class="material-symbols-outlined text-primary"
                    >build</span
                  >
                </div>
                <div>
                  <h4 class="font-bold text-on-surface">Fix My Recipe</h4>
                  <p class="text-sm text-on-surface-variant">
                    Get baking troubleshooting help
                  </p>
                </div>
              </div>
              <span
                class="material-symbols-outlined text-stone-400 group-hover:text-primary"
                >arrow_forward</span
              >
            </button>

            <button
              class="w-full flex items-center justify-between bg-white border border-pink-200 hover:border-primary hover:shadow-md p-4 rounded-2xl transition-all text-left group"
              onclick="
                handleQuickPrompt(
                  'What are some quick and easy cake ideas for beginners?',
                )
              "
            >
              <div class="flex items-center gap-3">
                <div class="bg-secondary-fixed p-3 rounded-xl">
                  <span class="material-symbols-outlined text-primary"
                    >lightbulb</span
                  >
                </div>
                <div>
                  <h4 class="font-bold text-on-surface">Quick Ideas</h4>
                  <p class="text-sm text-on-surface-variant">
                    Discover simple cake ideas
                  </p>
                </div>
              </div>
              <span
                class="material-symbols-outlined text-stone-400 group-hover:text-primary"
                >arrow_forward</span
              >
            </button>

            <button
              class="w-full flex items-center justify-between bg-white border border-pink-200 hover:border-primary hover:shadow-md p-4 rounded-2xl transition-all text-left group"
              onclick="
                handleQuickPrompt('Surprise me with a unique cake idea!')
              "
            >
              <div class="flex items-center gap-3">
                <div class="bg-secondary-fixed p-3 rounded-xl">
                  <span class="material-symbols-outlined text-primary"
                    >auto_awesome</span
                  >
                </div>
                <div>
                  <h4 class="font-bold text-on-surface">Surprise Me</h4>
                  <p class="text-sm text-on-surface-variant">
                    Get a random cake suggestion
                  </p>
                </div>
              </div>
              <span
                class="material-symbols-outlined text-stone-400 group-hover:text-primary"
                >arrow_forward</span
              >
            </button>
          </div>
        </div>
      </div>

      <!-- Chat Area (hidden when welcome screen is shown) -->
      <section
        id="chatArea"
        class="hidden flex-1 overflow-y-auto p-md space-y-6 chat-scroll pb-xl"
      >
        <!-- Messages will be added here by JavaScript -->
      </section>
      <!-- Bottom Input Area -->
      <div class="p-md bg-white border-t border-pink-100/50">
        <!-- Input Bar -->
        <div
          class="flex items-center gap-3 bg-surface-container-low border border-pink-100 p-2 pl-5 rounded-full shadow-sm focus-within:ring-2 ring-primary ring-offset-2 transition-all"
        >
          <input
            id="messageInput"
            class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder-stone-400 py-3"
            placeholder="Ask me about cakes..."
            type="text"
          />
          <div class="flex items-center gap-1 pr-1">
            <button
              id="sendBtn"
              class="bg-primary text-white p-3 rounded-full shadow-lg active:scale-90 transition-all flex items-center justify-center hover:shadow-xl"
              type="button"
              onclick="sendMessage()"
            >
              <span class="material-symbols-outlined" data-icon="send"
                >send</span
              >
            </button>
          </div>
        </div>
      </div>
    </main>

    <script>
      // Global state
      let currentChatId = null;
      let messageInput = document.getElementById("messageInput");
      let chatArea = document.getElementById("chatArea");
      let welcomeScreen = document.getElementById("welcomeScreen");
      let chatHistoryList = document.getElementById("chatHistoryList");
      let newChatBtn = document.getElementById("newChatBtn");

      // Initialize on page load
      window.addEventListener("DOMContentLoaded", async () => {
        await loadChatSessions();
        messageInput.addEventListener("keypress", function (event) {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
          }
        });
        newChatBtn.addEventListener("click", createNewChat);
      });

      // Load all chat sessions from backend
      async function loadChatSessions() {
        try {
          const response = await fetch('{{ url_for("api_all_chats") }}');
          if (!response.ok) throw new Error("Failed to load chats");

          const data = await response.json();
          const sessions = data.chat_sessions || [];
          currentChatId = data.current_chat_id;
          const hasCurrentChat = data.has_current_chat;

          // Clear and populate chat history list
          chatHistoryList.innerHTML = "";

          if (sessions.length === 0) {
            // No previous chats - show welcome screen
            showWelcomeScreen();
          } else {
            // Split sessions: current (if exists) and previous
            let currentSession = null;
            let previousSessions = [];

            sessions.forEach((session) => {
              if (session.is_current) {
                currentSession = session;
              } else {
                previousSessions.push(session);
              }
            });

            // Show current chat if exists
            if (currentSession && hasCurrentChat) {
              const button = createChatButton(currentSession, true);
              chatHistoryList.appendChild(button);

              // Load messages for current chat
              loadChatMessages(currentSession.chat_id);
            } else if (!hasCurrentChat) {
              // No current chat - will show welcome screen when message is sent
              showWelcomeScreen();
            }

            // Show "Previous Conversations" section if there are previous chats
            if (previousSessions.length > 0) {
              const divider = document.createElement("div");
              divider.className =
                "px-3 mb-4 mt-6 pt-4 border-t border-pink-100/50";
              divider.innerHTML =
                '<span class="text-[10px] font-bold uppercase tracking-widest text-stone-400">Previous Conversations</span>';
              chatHistoryList.appendChild(divider);

              previousSessions.forEach((session) => {
                const button = createChatButton(session, false);
                chatHistoryList.appendChild(button);
              });
            }
          }
        } catch (error) {
          console.error("Error loading chats:", error);
          showWelcomeScreen();
        }
      }

      // Helper function to create chat button
      function createChatButton(session, isCurrent) {
        const button = document.createElement("button");

        button.className = isCurrent
          ? "flex items-center gap-3 bg-pink-100/50 dark:bg-pink-900/30 text-pink-700 dark:text-pink-300 font-bold rounded-xl px-4 py-3 w-full text-left transition-all duration-200"
          : "flex items-center gap-3 text-stone-600 dark:text-stone-400 px-4 py-3 hover:translate-x-1 transition-transform w-full text-left hover:bg-white dark:hover:bg-stone-800 rounded-xl";

        button.onclick = () => switchChat(session.chat_id);

        const titleElement = document.createElement("span");
        titleElement.className = "truncate flex-1";
        titleElement.textContent = session.title;

        const iconElement = document.createElement("span");
        iconElement.className = "material-symbols-outlined text-[20px]";
        iconElement.textContent = "chat_bubble";

        button.appendChild(iconElement);
        button.appendChild(titleElement);

        return button;
      }

      // Load messages for a specific chat
      async function loadChatMessages(chatId) {
        try {
          const response = await fetch(
            `{{ url_for("api_chat_messages") }}?chat_id=${chatId}`,
          );
          if (!response.ok) throw new Error("Failed to load messages");

          const data = await response.json();
          const messages = data.messages || [];

          // Clear chat area
          chatArea.innerHTML = "";

          if (messages.length === 0) {
            showWelcomeScreen();
          } else {
            showChatArea();
            messages.forEach((msg) => {
              addMessageToChat(msg.sender, msg.message);
            });
            // Scroll to bottom
            chatArea.scrollTop = chatArea.scrollHeight;
          }
        } catch (error) {
          console.error("Error loading messages:", error);
        }
      }

      // Switch to a different chat
      async function switchChat(chatId) {
        try {
          const response = await fetch('{{ url_for("api_switch_chat") }}', {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ chat_id: chatId }),
          });

          if (!response.ok) throw new Error("Failed to switch chat");

          currentChatId = chatId;
          await loadChatSessions();
        } catch (error) {
          console.error("Error switching chat:", error);
        }
      }

      // Create a new chat session (just show welcome screen)
      async function createNewChat() {
        try {
          const response = await fetch('{{ url_for("api_new_chat") }}', {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
          });

          if (!response.ok) throw new Error("Failed to create new chat");

          // Clear current chat ID
          currentChatId = null;

          // Reload and show welcome screen
          await loadChatSessions();
          showWelcomeScreen();
        } catch (error) {
          console.error("Error creating chat:", error);
          alert("Failed to start new chat");
        }
      }

      // Show welcome screen
      function showWelcomeScreen() {
        welcomeScreen.classList.remove("hidden");
        chatArea.classList.add("hidden");
      }

      // Show chat area
      function showChatArea() {
        welcomeScreen.classList.add("hidden");
        chatArea.classList.remove("hidden");
      }

      // Handle quick start prompts
      function handleQuickPrompt(prompt) {
        messageInput.value = prompt;
        sendMessage();
      }

      // Send message to API
      async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        // Ensure we're in chat area
        showChatArea();

        // Clear input
        messageInput.value = "";

        // Add user message to chat
        addMessageToChat("user", message);

        try {
          // Send message to API
          const response = await fetch('{{ url_for("api_chat") }}', {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message: message }),
          });

          if (!response.ok) {
            throw new Error("Failed to get response");
          }

          const data = await response.json();

          // Add bot response to chat with metadata (recommendations, learning flags, etc.)
          addMessageToChat("bot", data.message, data);

          // Scroll to bottom
          chatArea.scrollTop = chatArea.scrollHeight;

          // Refresh chat sessions to update sidebar with new chat or updated time
          await loadChatSessions();
        } catch (error) {
          console.error("Error:", error);
          addMessageToChat(
            "bot",
            "Sorry, I encountered an error. Please try again.",
          );
        }
      }

      // Add message to chat display
      function addMessageToChat(sender, message, meta = {}) {
        if (!chatArea) return;

        const messageDiv = document.createElement("div");
        const isUser = sender === "user";
        const messageId = `msg_${Date.now()}_${Math.floor(Math.random() * 10000)}`;

        const recommendations = Array.isArray(meta?.recommendations)
          ? meta.recommendations
          : [];

        let feedbackSection = "";
        if (!isUser) {
          feedbackSection += `
            <div class="pt-2 border-t border-pink-100 mt-3">
              <p class="text-xs text-stone-500 mb-2">Was this response helpful?</p>
              <div class="flex items-center gap-2 flex-wrap">
                <button type="button" class="feedback-btn px-2 py-1 rounded-lg border border-green-200 text-green-700 text-xs hover:bg-green-50" data-target-type="response" data-target-id="${messageId}" data-feedback="like">👍 Like</button>
                <button type="button" class="feedback-btn px-2 py-1 rounded-lg border border-red-200 text-red-700 text-xs hover:bg-red-50" data-target-type="response" data-target-id="${messageId}" data-feedback="dislike">👎 Dislike</button>
              </div>
            </div>
          `;

          if (recommendations.length > 0) {
            const recommendationRows = recommendations
              .map(
                (item) => `
                  <div class="flex items-center justify-between gap-2 py-1.5">
                    <span class="text-xs text-stone-600 truncate">${escapeHtml(item.cake_name || "Cake")}</span>
                    <div class="flex gap-1">
                      <button type="button" class="feedback-btn px-2 py-1 rounded-lg border border-green-200 text-green-700 text-xs hover:bg-green-50" data-target-type="cake" data-target-id="${escapeHtml(item.cake_id || "")}" data-cake-name="${escapeHtml(item.cake_name || "Cake")}" data-feedback="like">👍</button>
                      <button type="button" class="feedback-btn px-2 py-1 rounded-lg border border-red-200 text-red-700 text-xs hover:bg-red-50" data-target-type="cake" data-target-id="${escapeHtml(item.cake_id || "")}" data-cake-name="${escapeHtml(item.cake_name || "Cake")}" data-feedback="dislike">👎</button>
                    </div>
                  </div>
                `,
              )
              .join("");

            feedbackSection += `
              <div class="pt-2 mt-2 border-t border-pink-100">
                <p class="text-xs text-stone-500 mb-1">Rate these cake suggestions:</p>
                <div class="space-y-1">${recommendationRows}</div>
              </div>
            `;
          }
        }

        messageDiv.className = isUser
          ? "flex flex-row-reverse gap-3 max-w-[80%] ml-auto"
          : "flex gap-3 max-w-[80%]";

        messageDiv.innerHTML = `
          <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${
            isUser
              ? "bg-primary-container text-on-primary-container"
              : "bg-secondary-container text-primary"
          }">
            <span class="material-symbols-outlined text-[18px]">
              ${isUser ? "person" : "smart_toy"}
            </span>
          </div>
          <div class="space-y-2 ${isUser ? "text-right" : ""}">
            <div class="text-body-md text-on-surface p-4 rounded-2xl ${
              isUser
                ? "bg-primary text-white rounded-tr-none"
                : "bg-surface-container-low rounded-tl-none border border-pink-50"
            }">
              <div class="space-y-2">
                ${markdownToHtml(message)}
              </div>
              ${feedbackSection}
            </div>
            <span class="text-[12px] text-stone-400 block px-1">
              ${new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              })}
            </span>
          </div>
        `;

        chatArea.appendChild(messageDiv);

        // Bind feedback buttons only for bot messages.
        if (!isUser) {
          const feedbackButtons = messageDiv.querySelectorAll(".feedback-btn");
          feedbackButtons.forEach((btn) => {
            btn.addEventListener("click", async () => {
              const targetType = btn.getAttribute("data-target-type");
              const targetId = btn.getAttribute("data-target-id");
              const feedback = btn.getAttribute("data-feedback");
              const cakeName = btn.getAttribute("data-cake-name") || "";

              await sendFeedback({
                target_type: targetType,
                target_id: targetId,
                cake_name: cakeName,
                feedback: feedback,
                context: {
                  source: "chat_ui",
                  message_id: messageId,
                  chat_id: currentChatId,
                },
              });

              // Disable sibling feedback buttons for the same target after submit.
              const sameTargetButtons = messageDiv.querySelectorAll(
                `.feedback-btn[data-target-type="${targetType}"][data-target-id="${targetId}"]`,
              );
              sameTargetButtons.forEach((sameBtn) => {
                sameBtn.disabled = true;
                sameBtn.classList.add("opacity-50", "cursor-not-allowed");
              });
            });
          });
        }
      }

      async function sendFeedback(payload) {
        try {
          const response = await fetch('{{ url_for("api_feedback") }}', {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            throw new Error("Failed to save feedback");
          }
        } catch (error) {
          console.error("Feedback error:", error);
        }
      }

      // Convert Markdown to HTML for display
      function markdownToHtml(text) {
        // Escape HTML special characters first (but preserve formatting markers)
        let html = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

        // Convert Markdown bold (**text**) to <strong>
        html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

        // Convert Markdown italic (*text*) to <em>
        html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");

        // Convert Markdown underline (_text_) to <u>
        html = html.replace(/_(.+?)_/g, "<u>$1</u>");

        // Convert newlines to <br>
        html = html.replace(/\n/g, "<br>");

        // Convert Markdown links [text](url) to HTML links
        html = html.replace(
          /\[(.+?)\]\((.+?)\)/g,
          '<a href="$2" target="_blank" class="text-blue-600 hover:underline">$1</a>',
        );

        return html;
      }

      // Escape HTML to prevent XSS (for plain text only)
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
